name: CI

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.event.pull_request.head.repo.full_name }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  check:
    name: Check (Detekt + Tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run check (detekt + unit tests)
        run: ./gradlew check --stacktrace

      - name: Publish test results
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: '**/build/test-results/**/TEST-*.xml'
          check_name: Test Results

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: '**/build/reports/detekt/'
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate coverage report
        if: always()
        run: ./gradlew koverXmlReport koverHtmlReport --stacktrace

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/kover/html/
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Build (Android + iOS Debug)
    needs: check
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Android & iOS debug targets
        run: ./gradlew assembleDebug linkDebugFrameworkIosArm64 linkDebugFrameworkIosSimulatorArm64 --stacktrace
