name: Compiler Plugin Tests

on:
  push:
    branches: [main, compiler-plugin]
    paths:
      - 'quo-vadis-compiler-plugin/**'
      - 'quo-vadis-compiler-plugin-native/**'
      - 'quo-vadis-annotations/**'
      - 'quo-vadis-core/**'
  pull_request:
    branches: [main]
    paths:
      - 'quo-vadis-compiler-plugin/**'
      - 'quo-vadis-compiler-plugin-native/**'
      - 'quo-vadis-annotations/**'
      - 'quo-vadis-core/**'

jobs:
  test:
    name: Compiler Plugin Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      
      - name: Compiler Plugin Unit Tests
        run: ./gradlew :quo-vadis-compiler-plugin:test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: quo-vadis-compiler-plugin/build/reports/tests/

  e2e:
    name: E2E Build Verification
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      
      - name: E2E Desktop Build (Compiler Plugin)
        run: ./gradlew :composeApp:jvmJar -PquoVadis.useCompilerPlugin=true

  publish-check:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
      
      - name: Verify Publishable
        run: |
          ./gradlew :quo-vadis-compiler-plugin:publishToMavenLocal
          ./gradlew :quo-vadis-compiler-plugin-native:publishToMavenLocal
